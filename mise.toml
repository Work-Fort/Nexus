[tools]
go = "1.26.0"

[tasks."build:deps"]
description = "Download external dependencies to build/"
run = """
#!/usr/bin/env bash
set -e
mkdir -p build
if [ ! -f build/node_exporter ]; then
    NODE_EXPORTER_VERSION="1.10.2"
    ARCH=$(uname -m)
    case "$ARCH" in
        x86_64)  ARCH="amd64" ;;
        aarch64) ARCH="arm64" ;;
    esac
    TARBALL="node_exporter-${NODE_EXPORTER_VERSION}.linux-${ARCH}.tar.gz"
    URL="https://github.com/prometheus/node_exporter/releases/download/v${NODE_EXPORTER_VERSION}/${TARBALL}"
    echo "Downloading node_exporter v${NODE_EXPORTER_VERSION}..."
    TMPDIR=$(mktemp -d)
    curl -sL "$URL" | tar xz -C "$TMPDIR" --strip-components=1
    cp "$TMPDIR/node_exporter" build/
    rm -rf "$TMPDIR"
    echo "Installed node_exporter to build/"
fi
"""

[tasks.build]
description = "Build all binaries (debug)"
depends = ["build:deps"]
run = [
    "go build -o build/nexus .",
    "go build -o build/nexus-netns ./cmd/nexus-netns/",
    "go build -o build/nexus-cni-exec ./cmd/nexus-cni-exec/",
    "go build -o build/nexus-quota ./cmd/nexus-quota/",
    "go build -o build/nexus-btrfs ./cmd/nexus-btrfs/",
    "go build -o build/nexus-dns ./cmd/nexus-dns/",
    "go build -o build/nexusctl ./cmd/nexusctl/",
]

[tasks."build:release"]
description = "Build all binaries (static release)"
run = [
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexus .",
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexus-netns ./cmd/nexus-netns/",
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexus-cni-exec ./cmd/nexus-cni-exec/",
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexus-quota ./cmd/nexus-quota/",
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexus-btrfs ./cmd/nexus-btrfs/",
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexus-dns ./cmd/nexus-dns/",
    "CGO_ENABLED=0 go build -ldflags='-s -w' -o build/nexusctl ./cmd/nexusctl/",
]

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks."test:unit"]
description = "Run unit tests only (skip integration)"
run = "go test -short ./..."

[tasks."test:btrfs"]
description = "Run btrfs package tests"
run = "go test -v ./pkg/btrfs/"

[tasks.run]
description = "Run nexus daemon"
env = { PATH = "{{cwd}}/build:{{env.PATH}}" }
run = "build/nexus daemon"

[tasks.check]
description = "Vet and lint"
run = "go vet ./..."

[tasks.sqlc]
description = "Generate sqlc code"
run = "sqlc generate"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f build/nexus build/nexus-netns build/nexus-cni-exec build/nexus-quota build/nexus-btrfs build/nexus-dns build/nexusctl build/node_exporter"

[tasks."install:local"]
description = "Install all binaries to ~/.local/bin, set capabilities, install systemd unit"
depends = ["build:release"]
run = """
#!/usr/bin/env bash
set -e

echo "Installing Nexus binaries to ~/.local/bin/"
mkdir -p ~/.local/bin
cp build/nexus build/nexus-netns build/nexus-cni-exec build/nexus-quota build/nexus-btrfs build/nexus-dns build/nexusctl build/node_exporter ~/.local/bin/

# Set capabilities on helper binaries (matches scripts/dev-setcap-loop.sh)
echo "Setting capabilities (requires sudo)..."
sudo setcap cap_sys_admin+ep ~/.local/bin/nexus-netns
sudo setcap cap_net_admin,cap_sys_admin+ep ~/.local/bin/nexus-cni-exec
sudo setcap cap_sys_admin+ep ~/.local/bin/nexus-quota
sudo setcap cap_sys_admin,cap_fowner+ep ~/.local/bin/nexus-btrfs
sudo setcap cap_net_bind_service+ep ~/.local/bin/nexus-dns

echo "Installing systemd user service"
mkdir -p ~/.config/systemd/user
cp dist/nexus.service ~/.config/systemd/user/
systemctl --user daemon-reload

echo "Done. Enable with: systemctl --user enable --now nexus"
"""

[tasks."openapi:export"]
description = "Export OpenAPI spec from running daemon (daemon must be running)"
run = "curl -sf http://127.0.0.1:9600/openapi -o docs/openapi.json && echo 'Exported to docs/openapi.json'"

[tasks.wipe]
description = "Remove all Nexus state (database, config, logs)"
run = """
#!/usr/bin/env bash
set -e

echo "Cleaning Nexus state..."

# Stop systemd service if running
if command -v systemctl >/dev/null 2>&1; then
    if systemctl --user is-active --quiet nexus 2>/dev/null; then
        echo "  Stopping systemd service"
        systemctl --user stop nexus
    fi
fi

# Remove database
if [ -f "$HOME/.local/state/nexus/nexus.db" ]; then
    echo "  Removing database"
    rm -f "$HOME/.local/state/nexus/nexus.db"
    rm -f "$HOME/.local/state/nexus/nexus.db-shm"
    rm -f "$HOME/.local/state/nexus/nexus.db-wal"
fi

# Remove logs
if [ -f "$HOME/.local/state/nexus/debug.log" ]; then
    echo "  Removing logs"
    rm -f "$HOME/.local/state/nexus/debug.log"
fi

# Remove config
if [ -f "$HOME/.config/nexus/config.yaml" ]; then
    echo "  Removing config"
    rm -f "$HOME/.config/nexus/config.yaml"
fi

# Clean up containerd namespace
if command -v ctr >/dev/null 2>&1; then
    echo "  Cleaning containerd nexus namespace"
    for c in $(sudo ctr -n nexus containers list -q 2>/dev/null); do
        echo "    Removing container: $c"
        sudo ctr -n nexus tasks kill "$c" 2>/dev/null || true
        sudo ctr -n nexus tasks delete "$c" 2>/dev/null || true
        sudo ctr -n nexus containers delete "$c" 2>/dev/null || true
    done
fi

echo "Nexus state cleaned"
"""

[tasks.ci]
description = "Run lint, unit tests, and vet"
run = ["mise run check", "mise run test:unit"]

[tasks.e2e]
description = "Run E2E tests (requires root, containerd, btrfs)"
depends = ["build"]
run = "cd tests/e2e && go test -v -count=1 -parallel 1 -timeout 10m ."

[tasks."aur:test"]
description = "Test AUR package build locally"
run = """
#!/usr/bin/env bash
set -e

cd aur

# Temporarily patch PKGBUILD to build from local source tree.
cp PKGBUILD PKGBUILD.bak
trap 'mv PKGBUILD.bak PKGBUILD' EXIT
cat > PKGBUILD << 'PKGBUILD_EOF'
# LOCAL TEST BUILD — generated by mise run aur:test
source PKGBUILD.bak

source=()
sha256sums=()

_projroot="${startdir}/.."

build() {
    cd "$_projroot"
    export CGO_ENABLED=0
    LDFLAGS="-s -w -X github.com/Work-Fort/Nexus/cmd.Version=v${pkgver}"
    go build -ldflags "${LDFLAGS}" -o "$srcdir/nexus"
    go build -ldflags "${LDFLAGS}" -o "$srcdir/nexusctl" ./cmd/nexusctl/
    go build -ldflags "-s -w" -o "$srcdir/nexus-netns" ./cmd/nexus-netns/
    go build -ldflags "-s -w" -o "$srcdir/nexus-cni-exec" ./cmd/nexus-cni-exec/
    go build -ldflags "-s -w" -o "$srcdir/nexus-quota" ./cmd/nexus-quota/
    go build -ldflags "-s -w" -o "$srcdir/nexus-btrfs" ./cmd/nexus-btrfs/
    go build -ldflags "-s -w" -o "$srcdir/nexus-dns" ./cmd/nexus-dns/
}

package() {
    install -Dm755 "$srcdir/nexus" "${pkgdir}/usr/bin/nexus"
    install -Dm755 "$srcdir/nexusctl" "${pkgdir}/usr/bin/nexusctl"
    install -Dm755 "$srcdir/nexus-netns" "${pkgdir}/usr/bin/nexus-netns"
    install -Dm755 "$srcdir/nexus-cni-exec" "${pkgdir}/usr/bin/nexus-cni-exec"
    install -Dm755 "$srcdir/nexus-quota" "${pkgdir}/usr/bin/nexus-quota"
    install -Dm755 "$srcdir/nexus-btrfs" "${pkgdir}/usr/bin/nexus-btrfs"
    install -Dm755 "$srcdir/nexus-dns" "${pkgdir}/usr/bin/nexus-dns"
    install -Dm644 "$_projroot/dist/nexus.service" "${pkgdir}/usr/lib/systemd/user/nexus.service"
    install -Dm755 "${srcdir}/node_exporter-${_node_exporter_ver}.linux-"*/node_exporter "${pkgdir}/usr/bin/node_exporter"
}
PKGBUILD_EOF

makepkg -sf --noconfirm
echo ""
echo "Package contents:"
pacman -Qlp *.pkg.tar.zst | grep -v debug
echo ""
echo "Dependencies:"
pacman -Qip *.pkg.tar.zst | grep "Depends On"
echo ""
echo "Install script:"
pacman -Qip *.pkg.tar.zst | grep "Install Script"
rm -f *.pkg.tar.zst
rm -rf src/ pkg/
"""

[tasks."e2e:clean"]
description = "Clean up leaked E2E containerd namespaces"
run = """
#!/usr/bin/env bash
set -e
echo "Cleaning E2E namespaces..."
for ns in $(ctr namespaces list -q | grep ^nexus-e2e- 2>/dev/null); do
  echo "  Cleaning namespace: $ns"
  for c in $(ctr -n "$ns" containers list -q 2>/dev/null); do
    ctr -n "$ns" tasks kill "$c" 2>/dev/null || true
    ctr -n "$ns" tasks delete "$c" 2>/dev/null || true
    ctr -n "$ns" containers delete "$c" 2>/dev/null || true
  done
  for img in $(ctr -n "$ns" images list -q 2>/dev/null); do
    ctr -n "$ns" images remove "$img" 2>/dev/null || true
  done
  ctr -n "$ns" content prune references 2>/dev/null || true
  ctr namespaces remove "$ns" 2>/dev/null || true
done
echo "E2E cleanup done"
"""
